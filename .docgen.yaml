# DocGen Configuration
# https://github.com/docgen/docgen

project:
  name: DocGen
  version: 1.0.0
  description: "Universal multi-language documentation generator"

languages:
  - name: typescript
    source: packages
    include:
      - "**/*.ts"
      - "**/*.tsx"
    exclude:
      - "**/*.test.ts"
      - "**/*.spec.ts"
      - "**/*.d.ts"
      - "**/node_modules/**"
      - "**/dist/**"
    parser: "@docgen/parser-typescript"

  # - name: java
  #   source: src/main/java
  #   include: ["**/*.java"]
  #   exclude: ["**/test/**", "**/generated/**"]
  #   parser: "@docgen/parser-java"

  # - name: python
  #   source: scripts
  #   include: ["**/*.py"]
  #   exclude: ["**/test_*", "**/*_test.py"]
  #   parser: "@docgen/parser-python"

output:
  markdown:
    enabled: true
    outputDir: docs/components
    includeSourceLinks: true
    collapsibleSections: true

  # html:
  #   enabled: true
  #   engine: docusaurus
  #   outputDir: docs-site/
  #   sidebar: auto
  #   search: true

  pdf:
    enabled: true
    engine: puppeteer
    outputDir: docs/pdf
    options:
      fileName: docgen-components.pdf

  # confluence:
  #   enabled: false
  #   baseUrl: https://your-org.atlassian.net
  #   spaceKey: DOCS
  #   auth: env:CONFLUENCE_TOKEN

validation:
  coverage:
    threshold: 80
    enforce: false
    exclude:
      - "**/internal/**"
  rules:
    require-description: warn
    require-param-docs: warn
    require-return-docs: off
    require-examples: off

adr:
  directory: docs/decisions

changelog:
  conventionalCommits: true
  groupBy: type
  outputFile: CHANGELOG.md
