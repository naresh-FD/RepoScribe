# DocGen Configuration
# https://github.com/docgen/docgen

project:
  name: RepoScribe
  version: 1.0.0
  description: "Documentation generator focused on React and Java Spring Boot projects"

languages:
  - name: typescript
    source: packages
    include:
      - "**/*.ts"
      - "**/*.tsx"
    exclude:
      - "**/*.test.ts"
      - "**/*.spec.ts"
      - "**/*.d.ts"
      - "**/node_modules/**"
      - "**/dist/**"
    parser: "@docgen/parser-typescript"

  # Spring Boot target configuration
  # - name: java
  #   source: src/main/java
  #   include: ["**/*.java"]
  #   exclude: ["**/test/**", "**/generated/**"]
  #   parser: "@docgen/parser-java"

output:
  markdown:
    enabled: true
    outputDir: docs/components
    includeSourceLinks: true
    collapsibleSections: true

  pdf:
    enabled: true
    engine: puppeteer
    outputDir: docs/pdf
    options:
      fileName: docgen-components.pdf

validation:
  coverage:
    threshold: 80
    enforce: false
    exclude:
      - "**/internal/**"
  rules:
    require-description: warn
    require-param-docs: warn
    require-return-docs: off
    require-examples: off

adr:
  directory: docs/decisions

changelog:
  conventionalCommits: true
  groupBy: type
  outputFile: CHANGELOG.md
