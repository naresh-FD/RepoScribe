name: Documentation Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  doc-validate:
    name: Validate Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build packages
        run: npm run build

      - name: Validate doc coverage
        run: npx docgen validate --json > doc-report.json

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: doc-coverage-report
          path: doc-report.json

      - name: Comment PR with coverage
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('doc-report.json', 'utf8'));
            const icon = report.passed ? '✅' : '❌';
            const body = `## ${icon} Documentation Coverage: ${report.coverage}%\n\nThreshold: ${report.threshold}%\n\n| Module | Coverage |\n|--------|----------|\n${report.modules.map(m => `| ${m.name} | ${m.coverage}% |`).join('\n')}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  doc-generate:
    name: Generate Documentation
    needs: doc-validate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build packages
        run: npm run build

      - name: Generate docs
        run: npx docgen generate --format markdown html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs-site/build
